<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship</title>
</head>
<body>
    <header>
        <h1>Battleship</h1>
        <h2 id="message">Place your attacks carefully...</h2>
    </header>

    <main class="boards-container">
        <div class="board-wrapper">
            <h3>Your Waters</h3>
            <div id="player-board" class="board"></div>
        </div>
        
        <div class="board-wrapper">
            <h3>Enemy Waters</h3>
            <div id="computer-board" class="board"></div>
        </div>
    </main>
</body>
</html>
