<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #14141a;
            --surface-2: #1c1c26;
            --border: #2a2a38;
            --border-hover: #4a4a68;
            --gold: #c9a84c;
            --gold-light: #e8c96a;
            --gold-dim: rgba(201, 168, 76, 0.12);
            --text-primary: #f0ede8;
            --text-secondary: #9896a4;
            --text-muted: #5a586a;
            --green: #3dba6f;
            --green-dim: rgba(61, 186, 111, 0.12);
            --red: #e05252;
            --red-dim: rgba(224, 82, 82, 0.1);
            --blue: #4f7ef7;
            --radius-card: 16px;
            --radius-sm: 8px;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(255,255,255,0.03) inset;
            --shadow-hover: 0 20px 48px rgba(0, 0, 0, 0.7), 0 0 0 1px var(--border-hover);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;

            /* Subtle noise texture */
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
        }

        /* ── HEADER ── */
        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 2rem 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 60%, #a07830 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        header h1::after {
            content: 'YOUR COLLECTION';
            position: absolute;
            bottom: -14px;
            left: 2px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            color: var(--text-muted);
            -webkit-text-fill-color: var(--text-muted);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* ── BUTTONS – base ── */
        button {
            cursor: pointer;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            border-radius: var(--radius-sm);
            padding: 10px 18px;
            transition: all 0.18s ease;
        }

        .add-btn {
            background: linear-gradient(135deg, var(--gold) 0%, #a8782a 100%);
            color: #0d0b06;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            box-shadow: 0 4px 16px rgba(201, 168, 76, 0.25);
        }
        .add-btn:hover {
            filter: brightness(1.12);
            box-shadow: 0 6px 24px rgba(201, 168, 76, 0.4);
            transform: translateY(-1px);
        }

        /* ── LIBRARY GRID ── */
        #library-container {
            width: 100%;
            max-width: 1100px;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.75rem;
        }

        /* ── BOOK CARD ── */
        .book-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform 0.25s cubic-bezier(.22,.68,0,1.2), box-shadow 0.25s ease, border-color 0.25s ease;
            animation: fadeUp 0.4s ease both;
        }

        .book-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
            border-color: var(--border-hover);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Cover image wrapper */
        .book-card .cover-wrap {
            position: relative;
            overflow: hidden;
            height: 300px;
            background: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .book-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 10px;
            transition: transform 0.4s ease;
        }

        .book-card:hover img {
            transform: scale(1.03);
        }

        /* Gradient overlay on cover */
        .book-card .cover-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 60%, rgba(13, 13, 15, 0.6) 100%);
            pointer-events: none;
        }

        /* Card body */
        .book-card .card-body {
            padding: 1.2rem 1.4rem 1.4rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 4px;
        }

        .book-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-card p {
            font-size: 0.82rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .book-card p strong {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
        }

        /* ── CARD BUTTONS ── */
        .card-buttons {
            margin-top: auto;
            padding-top: 1rem;
            display: flex;
            gap: 8px;
        }

        .status-btn {
            flex: 1;
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            font-size: 0.78rem;
            padding: 8px 10px;
            letter-spacing: 0.04em;
        }

        .status-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .status-btn.read {
            background: var(--green-dim);
            color: var(--green);
            border-color: rgba(61, 186, 111, 0.25);
        }

        .status-btn.read:hover {
            background: rgba(61, 186, 111, 0.2);
        }

        .remove-btn {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(224, 82, 82, 0.15);
            font-size: 0.78rem;
            padding: 8px 12px;
        }

        .remove-btn:hover {
            background: rgba(224, 82, 82, 0.18);
            border-color: rgba(224, 82, 82, 0.3);
        }

        /* ── DIALOG ── */
        dialog {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0;
            width: 90%;
            max-width: 460px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
            color: var(--text-primary);
            overflow: hidden;
        }

        dialog::backdrop {
            background: rgba(5, 5, 8, 0.85);
            backdrop-filter: blur(6px);
        }

        /* Dialog inner wrapper */
        dialog > * {
            padding: 0 1.8rem;
        }

        dialog::before {
            content: 'Add to Library';
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            padding: 1.8rem 1.8rem 1.2rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
        }

        /* ── SEARCH SECTION ── */
        .search-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 1.4rem 1.8rem 1.2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.01);
        }

        .type-selector {
            display: flex;
            gap: 8px;
        }

        .type-selector label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .type-selector label:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .type-selector input[type="radio"] {
            accent-color: var(--gold);
        }

        .search-bar {
            display: flex;
            gap: 8px;
        }

        .search-bar input {
            flex: 1;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 9px 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-bar input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        .search-bar input::placeholder { color: var(--text-muted); }

        .search-btn {
            background: linear-gradient(135deg, #2d8f5e 0%, #1a6040 100%);
            color: #d0f5e3;
            font-size: 0.82rem;
            padding: 9px 16px;
            box-shadow: 0 4px 12px rgba(29, 120, 80, 0.25);
        }

        .search-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        /* ── FORM ── */
        #book-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 1.4rem 1.8rem 1.8rem;
        }

        #book-form input[type="text"],
        #book-form input[type="number"] {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: var(--radius-sm);
            padding: 10px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            width: 100%;
        }

        #book-form input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px var(--gold-dim);
        }

        #book-form input::placeholder { color: var(--text-muted); }

        #book-form label {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.83rem;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 0;
        }

        #book-form input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--green);
            cursor: pointer;
        }

        /* Form footer buttons */
        #book-form > div:last-child {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        #cancel-btn {
            flex: 1;
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        #cancel-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        #book-form button[type="submit"] {
            flex: 1;
            font-size: 0.85rem;
        }

        /* ── EMPTY STATE (nice touch) ── */
        #library-container:empty::before {
            content: 'Your library is empty. Add your first book!';
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            padding: 4rem 0;
            font-style: italic;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            header { padding: 1.8rem 1.2rem 1.5rem; }
            #library-container { padding: 0 1.2rem 3rem; gap: 1.2rem; }
            .book-card .cover-wrap { height: 260px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>BookHaven</h1>
        <button id="new-book-btn" class="add-btn">+ Add New Item</button>
    </header>

    <main id="library-container"></main>

    <dialog id="book-dialog">
        <div class="search-section">
            <div class="type-selector">
                <label><input type="radio" name="search-type" value="book" checked> Book (Google)</label>
                <label><input type="radio" name="search-type" value="manga"> Manga (Jikan)</label>
            </div>
            <div class="search-bar">
                <input type="text" id="api-query" placeholder="Search title...">
                <button type="button" id="api-search-btn" class="search-btn">Search</button>
            </div>
        </div>

        <form id="book-form">
            <input type="text" id="title" placeholder="Title" required>
            <input type="text" id="author" placeholder="Author/Artist" required>
            <input type="number" id="pages" placeholder="Pages/Chapters" required>
            <input type="hidden" id="cover-url">

            <label><input type="checkbox" id="read"> Finished reading?</label>

            <div style="display:flex; gap:10px; margin-top:10px;">
                <button type="button" id="cancel-btn" style="flex:1;">Cancel</button>
                <button type="submit" class="add-btn" style="flex:1">Add to Library</button>
            </div>
        </form>
    </dialog>

    <script>
        const myLibrary = [];
        const container = document.getElementById('library-container');
        const dialog = document.getElementById('book-dialog');
        const form = document.getElementById('book-form');

        function Book(title, author, pages, read, cover) {
            this.id = crypto.randomUUID();
            this.title = title;
            this.author = author;
            this.pages = pages;
            this.read = read;
            this.cover = cover || 'https://via.placeholder.com/150x225?text=No+Cover';
        }

        Book.prototype.toggleRead = function() {
            this.read = !this.read;
        };

        function addBookToLibrary(title, author, pages, read, cover) {
            const newBook = new Book(title, author, pages, read, cover);
            myLibrary.push(newBook);
            displayLibrary();
        }

        document.getElementById('api-search-btn').addEventListener('click', async () => {
            const query = document.getElementById('api-query').value;
            const type = document.querySelector('input[name="search-type"]:checked').value;
            if (!query) return;

            if (type === 'book') {
                const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                if (data.items) {
                    const info = data.items[0].volumeInfo;
                    fillForm(info.title, info.authors?.[0], info.pageCount, info.imageLinks?.thumbnail);
                }
            } else {
                const res = await fetch(`https://api.jikan.moe/v4/manga?q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data.data.length > 0) {
                    const info = data.data[0];
                    fillForm(info.title, info.authors?.[0]?.name, info.chapters || info.volumes, info.images.jpg.image_url);
                }
            }
        });

        function fillForm(t, a, p, c) {
            document.getElementById('title').value = t || '';
            document.getElementById('author').value = a || 'Unknown';
            document.getElementById('pages').value = p || 0;
            document.getElementById('cover-url').value = c || '';
        }

        function displayLibrary() {
            container.innerHTML = '';
            myLibrary.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.setAttribute('data-id', item.id);
                card.style.animationDelay = `${i * 0.06}s`;
                
                card.innerHTML = `
                    <div class="cover-wrap">
                        <img src="${item.cover}" alt="cover">
                    </div>
                    <div class="card-body">
                        <h3>${item.title}</h3>
                        <p><strong>By</strong> ${item.author}</p>
                        <p><strong>Length</strong> ${item.pages}</p>
                        <div class="card-buttons">
                            <button class="status-btn ${item.read ? 'read' : ''}">
                                ${item.read ? '✓ Completed' : '▶ Reading'}
                            </button>
                            <button class="remove-btn">✕</button>
                        </div>
                    </div>
                `;

                card.querySelector('.remove-btn').addEventListener('click', () => {
                    removeItem(item.id);
                });

                card.querySelector('.status-btn').addEventListener('click', () => {
                    toggleStatus(item.id);
                });

                container.appendChild(card);
            });
        }

        function removeItem(id) {
            const idx = myLibrary.findIndex(b => b.id === id);
            if (idx !== -1) {
                myLibrary.splice(idx, 1);
            }
            displayLibrary();
        }

        function toggleStatus(id) {
            const item = myLibrary.find(b => b.id === id);
            if (item) {
                item.toggleRead();
                displayLibrary();
            }
        }

        document.getElementById('new-book-btn').addEventListener('click', () => dialog.showModal());
        document.getElementById('cancel-btn').addEventListener('click', () => {
            form.reset();
            dialog.close();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const pages = document.getElementById('pages').value;
            const read = document.getElementById('read').checked;
            const cover = document.getElementById('cover-url').value;

            addBookToLibrary(title, author, pages, read, cover);
            
            form.reset();
            document.getElementById('api-query').value = '';
            dialog.close();
        });

        addBookToLibrary('Sample Book', 'Author Name', 300, true, '');
    </script>
</body>
</html>
