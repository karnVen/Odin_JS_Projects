<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bookhaVen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Warm/Beige Theme Palette */
            --bg-app: #eef0eb; /* Slightly darker body to make the app pop */
            --bg-sidebar: #ffffff;
            --bg-main: #f9f6f0;
            --sidebar-active: #eee8dc;
            
            --text-main: #4a4238;
            --text-light: #897e70;
            --text-accent: #c4a47c;
            
            --shelf-top: #e8e1d5;
            --shelf-front: #d5ccbe;
            --shelf-shadow: rgba(165, 155, 139, 0.4);
            
            --accent-primary: #8c7659;
            --border-color: #eae3d9;
            --radius-panel: 24px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2vh 2vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents body scroll */
        }

        /* ── APP LAYOUT (COMPACTED) ── */
        .app-container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 94vh; /* Forces it to fit on one screen */
            background: var(--bg-sidebar);
            border-radius: var(--radius-panel);
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            border: 1px solid var(--border-color);
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 220px; /* Reduced width */
            padding: 2rem 1.2rem;
            display: flex;
            flex-direction: column;
            border-right: 2px dashed var(--border-color);
            flex-shrink: 0;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #7a6345;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Minimalist Feather SVG Icon */
        .logo svg {
            width: 22px;
            height: 22px;
            stroke: #7a6345;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-item {
            padding: 10px 16px;
            border-radius: 10px;
            color: var(--text-light);
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .nav-item.active {
            background: var(--sidebar-active);
            color: var(--text-main);
            font-weight: 700;
        }

        .continue-reading {
            margin-top: auto;
            background: #e9e3d8;
            padding: 0.8rem;
            border-radius: 12px;
            text-align: center;
            display: none; 
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .continue-reading p {
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .continue-reading img {
            width: 70px;
            height: 105px;
            object-fit: cover;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .continue-reading h5 {
            font-size: 0.75rem;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            flex: 1;
            background: var(--bg-main);
            padding: 1.5rem 2.5rem;
            overflow-y: auto;
            border-top-left-radius: var(--radius-panel);
            border-bottom-left-radius: var(--radius-panel);
            margin: 8px 8px 8px 0;
            min-width: 0; 
        }

        /* Custom Scrollbar for Main Content */
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-track { background: transparent; }
        .main-content::-webkit-scrollbar-thumb { background: #d5ccbe; border-radius: 3px; }

        /* ── TOP HEADER ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem; /* Reduced margin */
            gap: 15px;
            position: sticky;
            top: 0;
            background: var(--bg-main);
            padding-bottom: 10px;
            z-index: 50;
        }

        .search-area {
            display: flex;
            flex: 1;
            max-width: 400px;
            background: #ffffff;
            border-radius: 10px;
            padding: 5px 12px;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid var(--border-color);
        }

        .search-area input {
            border: none;
            outline: none;
            padding: 8px;
            width: 100%;
            font-family: inherit;
            color: var(--text-main);
            background: transparent;
            font-size: 0.85rem;
        }

        .add-btn {
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        
        .add-btn:hover { transform: translateY(-2px); }

        /* ── SHELVES ── */
        .library-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem; /* Reduced from 4rem */
        }

        .shelf-section { width: 100%; }

        .shelf-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
            padding: 0 5px;
        }

        .shelf-header h2 {
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-size: 1.2rem; /* Reduced font size */
        }

        .shelf-track {
            display: flex;
            gap: 20px; /* Reduced gap */
            padding: 0 20px 0px;
            border-bottom: 10px solid var(--shelf-top);
            position: relative;
            min-height: 140px; /* Reduced height */
            align-items: flex-end;
        }

        /* 3D Shelf Front Edge */
        .shelf-track::after {
            content: '';
            position: absolute;
            bottom: -15px; left: 0; right: 0;
            height: 5px;
            background: var(--shelf-front);
            box-shadow: 0 10px 10px -5px var(--shelf-shadow);
            border-radius: 0 0 3px 3px;
        }

        .empty-shelf {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: 20px;
            color: var(--text-light);
            font-size: 0.8rem;
            font-style: italic;
            left: 0;
        }

        /* ── BOOK ITEMS ── */
        .book-item {
            position: relative;
            width: 85px; /* Smaller width */
            bottom: 0;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            cursor: pointer;
            flex-shrink: 0; 
        }

        .book-item:hover {
            transform: translateY(-10px);
            z-index: 100;
        }

        .book-item img {
            width: 100%;
            height: 125px; /* Smaller height */
            object-fit: cover;
            border-radius: 2px 4px 4px 2px;
            box-shadow: -3px 0px 6px rgba(0,0,0,0.1), 3px 4px 10px rgba(0,0,0,0.15);
            display: block;
            border-left: 2px solid rgba(255,255,255,0.4); 
            background: #e8e1d5;
        }

        /* Overlay Info on Hover */
        /* Overlay Info on Hover */
        .book-overlay {
            position: absolute;
            bottom: 100%; left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #ffffff;
            padding: 8px;
            border-radius: 10px;
            width: 140px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            z-index: 20;
            pointer-events: none; /* Prevents flickering */
        }

        /* 🛠️ THE FIX: This creates an invisible bridge between the overlay and the book */
        .book-overlay::after {
            content: '';
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            height: 10px; /* Covers the gap */
            background: transparent;
        }

        .book-item:hover .book-overlay {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-5px);
            pointer-events: auto; /* Re-enables clicking */
        }

        
        .book-overlay h4 { font-size: 0.75rem; margin-bottom: 2px; color: var(--text-main); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .book-overlay p { font-size: 0.65rem; color: var(--text-light); margin-bottom: 6px; }

        .book-actions { display: flex; gap: 4px; }
        
        .action-btn {
            flex: 1; padding: 5px; font-size: 0.65rem; border-radius: 4px;
            border: none; cursor: pointer; font-weight: 700;
        }
        
        .btn-status { background: var(--bg-main); color: var(--text-main); }
        .btn-status.read { background: #e2f0e9; color: #2e7d52; }
        .btn-delete { background: #fbecec; color: #c62828; }

        /* ── DIALOG ── */
        dialog {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 0;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            color: var(--text-main);
        }

        dialog::backdrop { background: rgba(74, 66, 56, 0.6); backdrop-filter: blur(4px); }
        dialog > * { padding: 0 1.5rem; }

        dialog::before {
            content: 'Add to bookhaVen';
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--text-main);
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .search-section { display: flex; flex-direction: column; gap: 10px; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border-color); background: var(--bg-main); }
        .type-selector label { font-size: 0.8rem; font-weight: 700; color: var(--text-light); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; margin-right: 15px;}
        .search-bar { display: flex; gap: 8px; }
        .search-bar input, #book-form input[type="text"], #book-form input[type="number"] {
            flex: 1; background: #ffffff; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 8px 12px; font-family: inherit; font-size: 0.85rem; outline: none; width: 100%;
        }
        .search-btn { background: var(--text-main); color: #fff; border: none; padding: 0 12px; border-radius: 8px; cursor: pointer; font-weight: 700;}

        #book-form { display: flex; flex-direction: column; gap: 10px; padding: 1.2rem 1.5rem 1.5rem; }
        #book-form label { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .form-actions { display: flex; gap: 10px; margin-top: 8px; }
        #cancel-btn { flex: 1; background: var(--bg-main); color: var(--text-light); border: none; border-radius: 8px; font-weight: 700; cursor: pointer; padding: 8px;}

        /* ── RESPONSIVE DESIGN (MOBILE & TABLET) ── */
        @media (max-width: 900px) {
            body { padding: 0; overflow: auto; }
            .app-container { 
                flex-direction: column; 
                border-radius: 0; 
                height: 100vh; 
                border: none;
            }
            
            .sidebar {
                width: 100%;
                padding: 1rem 1.5rem;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                z-index: 100;
            }

            .logo { margin-bottom: 0; }
            .nav-menu { flex-direction: row; }
            .continue-reading { display: none !important; } 

            .main-content { margin: 0; padding: 1.5rem; border-radius: 0; }
            .top-bar { flex-direction: column; gap: 10px; align-items: stretch; margin-bottom: 1.5rem;}
            .search-area { max-width: 100%; }

            .shelf-track {
                overflow-x: auto;
                padding-bottom: 15px; 
                gap: 15px;
                scroll-snap-type: x mandatory;
            }
            
            .book-item { scroll-snap-align: start; }
            .book-item:hover .book-overlay { display: none; }

            .mobile-actions { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
            .mobile-actions button { padding: 5px; font-size: 0.65rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 700; }
        }

        @media (min-width: 901px) { .mobile-actions { display: none; } }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-library-big-icon lucide-library-big"><rect width="8" height="18" x="3" y="3" rx="1"/><path d="M7 3v18"/><path d="M20.4 18.9c.2.5-.1 1.1-.6 1.3l-1.9.7c-.5.2-1.1-.1-1.3-.6L11.1 5.1c-.2-.5.1-1.1.6-1.3l1.9-.7c.5-.2 1.1.1 1.3.6Z"/></svg>
                bookhaVen
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item active"> <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-marked-icon lucide-book-marked"><path d="M10 2v8l3-3 3 3V2"/><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>My library</li>
            </ul>

            <div class="continue-reading" id="continue-reading-panel">
                <p>Continue reading</p>
                <img id="cr-cover" src="" alt="Current Book">
                <h5 id="cr-title">Title</h5>
                <button class="add-btn" style="width: 100%; padding: 6px; font-size: 0.75rem;" onclick="markCurrentAsRead()">Mark Finished</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="search-area">
                    <span style="color:#a59b8b; margin-right: 5px;"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search-icon lucide-search"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg></span>
                    <input type="text" id="local-search" placeholder="Search title or author...">
                </div>
                <button id="new-book-btn" class="add-btn">+ Add Item</button>
            </header>

            <div id="library-container" class="library-container">
                </div>
        </main>
    </div>

    <dialog id="book-dialog">
        <div class="search-section">
            <div class="type-selector">
                <label><input type="radio" name="search-type" value="manga" checked> Manga</label>
                <label><input type="radio" name="search-type" value="book"> Book</label>
            </div>
            <div class="search-bar">
                <input type="text" id="api-query" placeholder="Search web API...">
                <button type="button" id="api-search-btn" class="search-btn">Find</button>
            </div>
        </div>

        <form id="book-form">
            <input type="text" id="title" placeholder="Title" required>
            <input type="text" id="author" placeholder="Author/Artist" required>
            <input type="number" id="pages" placeholder="Pages/Chapters" required>
            <input type="hidden" id="cover-url">

            <label><input type="checkbox" id="read"> Marked as Finished?</label>

            <div class="form-actions">
                <button type="button" id="cancel-btn">Cancel</button>
                <button type="submit" class="add-btn" style="flex:1">Add to Shelf</button>
            </div>
        </form>
    </dialog>

    <script>
        const myLibrary = [];
        const container = document.getElementById('library-container');
        const dialog = document.getElementById('book-dialog');
        const form = document.getElementById('book-form');
        const localSearchInput = document.getElementById('local-search');
        let currentReadingId = null;

        // Data Object Definition
        function Book(title, author, pages, read, cover, type) {
            this.id = crypto.randomUUID();
            this.title = title;
            this.author = author;
            this.pages = pages;
            this.read = read;
            this.cover = cover || 'https://via.placeholder.com/150x225/e8e1d5/897e70?text=No+Cover';
            this.type = type || 'book'; 
        }

        Book.prototype.toggleRead = function() {
            this.read = !this.read;
        };

        function addBookToLibrary(title, author, pages, read, cover, type) {
            const newBook = new Book(title, author, pages, read, cover, type);
            myLibrary.push(newBook);
            displayLibrary(); // Will render based on current search filter
        }

        // Dummy Data Initialization
        addBookToLibrary('Berserk, Vol. 1', 'Kentaro Miura', 224, false, 'https://cdn.myanimelist.net/images/manga/1/157897.jpg', 'manga');
        addBookToLibrary('Jujutsu Kaisen, Vol. 1', 'Gege Akutami', 192, false, 'https://cdn.myanimelist.net/images/manga/3/210341.jpg', 'manga');
        addBookToLibrary('1984', 'George Orwell', 328, false, 'https://books.google.com/books/content?id=kotPYEqx7pmMC&printsec=frontcover&img=1&zoom=1', 'book');
        addBookToLibrary('Steve Jobs', 'Walter Isaacson', 656, true, 'https://books.google.com/books/content?id=8U2oAAAAQBAJ&printsec=frontcover&img=1&zoom=1', 'book');
        addBookToLibrary('Death Note, Vol. 1', 'Tsugumi Ohba', 200, true, 'https://cdn.myanimelist.net/images/manga/2/258749.jpg', 'manga');

        // Main Render Logic with Search Filter
        function displayLibrary() {
            container.innerHTML = '';
            
            // Get current search term (lowercase for case-insensitive matching)
            const filterTerm = localSearchInput.value.toLowerCase();
            
            // Filter the master list based on the search input
            const filteredLibrary = myLibrary.filter(b => 
                b.title.toLowerCase().includes(filterTerm) || 
                b.author.toLowerCase().includes(filterTerm)
            );
            
            // Categorize the filtered items
            const unreadManga = filteredLibrary.filter(b => !b.read && b.type === 'manga');
            const unreadBooks = filteredLibrary.filter(b => !b.read && b.type === 'book');
            const finishedItems = filteredLibrary.filter(b => b.read);

            // Render Exact 3 Shelves Always
            renderShelf('Manga', unreadManga);
            renderShelf('Books', unreadBooks);
            renderShelf('Completed', finishedItems);

            updateContinueReading();
        }

        function renderShelf(shelfTitle, booksArray) {
            const section = document.createElement('div');
            section.className = 'shelf-section';
            
            let booksHTML = '';
            
            if (booksArray.length === 0) {
                booksHTML = `<div class="empty-shelf">No items found on this shelf.</div>`;
            } else {
                booksArray.forEach(item => {
                    booksHTML += `
                        <div class="book-item" data-id="${item.id}">
                            <img src="${item.cover}" alt="cover">
                            
                            <div class="book-overlay">
                                <h4>${item.title}</h4>
                                <p>${item.author}</p>
                                <div class="book-actions">
                                    <button class="action-btn btn-status ${item.read ? 'read' : ''}" onclick="toggleStatus('${item.id}')">
                                        ${item.read ? '✓ Done' : 'Reading'}
                                    </button>
                                    <button class="action-btn btn-delete" onclick="removeItem('${item.id}')">✕</button>
                                </div>
                            </div>

                            <div class="mobile-actions">
                                <button class="btn-status ${item.read ? 'read' : ''}" onclick="toggleStatus('${item.id}')">
                                    ${item.read ? '✓ Done' : 'Reading'}
                                </button>
                                <button class="btn-delete" onclick="removeItem('${item.id}')">Delete</button>
                            </div>
                        </div>
                    `;
                });
            }

            section.innerHTML = `
                <div class="shelf-header">
                    <h2>${shelfTitle}</h2>
                </div>
                <div class="shelf-track">
                    ${booksHTML}
                </div>
            `;
            container.appendChild(section);
        }

        // Functional "Continue Reading" Logic
        function updateContinueReading() {
            // Always check the full library, ignoring search filters, so the panel remains stable
            const unreadItems = myLibrary.filter(b => !b.read);
            const panel = document.getElementById('continue-reading-panel');
            
            if (unreadItems.length > 0) {
                // Pick the most recently added unread item
                const activeBook = unreadItems[unreadItems.length - 1];
                currentReadingId = activeBook.id;
                
                document.getElementById('cr-cover').src = activeBook.cover;
                document.getElementById('cr-title').innerText = activeBook.title;
                
                panel.style.display = 'block';
            } else {
                currentReadingId = null;
                panel.style.display = 'none';
            }
        }

        // Search Bar Event Listener
        localSearchInput.addEventListener('input', () => {
            displayLibrary();
        });

        // Global functions for inline HTML onclick handlers
        window.removeItem = function(id) {
            const idx = myLibrary.findIndex(b => b.id === id);
            if (idx !== -1) myLibrary.splice(idx, 1);
            displayLibrary();
        }

        window.toggleStatus = function(id) {
            const item = myLibrary.find(b => b.id === id);
            if (item) item.toggleRead();
            displayLibrary();
        }

        window.markCurrentAsRead = function() {
            if (currentReadingId) {
                toggleStatus(currentReadingId);
            }
        }

        // API Fetch Logic
        document.getElementById('api-search-btn').addEventListener('click', async () => {
            const query = document.getElementById('api-query').value;
            const type = document.querySelector('input[name="search-type"]:checked').value;
            if (!query) return;

            // Simple loading state
            const btn = document.getElementById('api-search-btn');
            const originalText = btn.innerText;
            btn.innerText = '...';

            try {
                if (type === 'book') {
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    if (data.items) {
                        const info = data.items[0].volumeInfo;
                        fillForm(info.title, info.authors?.[0], info.pageCount, info.imageLinks?.thumbnail?.replace('http:', 'https:'));
                    }
                } else {
                    const res = await fetch(`https://api.jikan.moe/v4/manga?q=${encodeURIComponent(query)}&limit=1`);
                    const data = await res.json();
                    if (data.data.length > 0) {
                        const info = data.data[0];
                        fillForm(info.title, info.authors?.[0]?.name, info.chapters || info.volumes, info.images.jpg.image_url);
                    }
                }
            } catch (e) {
                console.error("API Fetch Error", e);
            } finally {
                btn.innerText = originalText;
            }
        });

        function fillForm(t, a, p, c) {
            document.getElementById('title').value = t || '';
            document.getElementById('author').value = a || 'Unknown';
            document.getElementById('pages').value = p || 0;
            document.getElementById('cover-url').value = c || '';
        }

        // Dialog Interactions
        document.getElementById('new-book-btn').addEventListener('click', () => dialog.showModal());
        document.getElementById('cancel-btn').addEventListener('click', () => {
            form.reset();
            dialog.close();
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const pages = document.getElementById('pages').value;
            const read = document.getElementById('read').checked;
            const cover = document.getElementById('cover-url').value;
            const type = document.querySelector('input[name="search-type"]:checked').value;

            addBookToLibrary(title, author, pages, read, cover, type);
            
            form.reset();
            document.getElementById('api-query').value = '';
            dialog.close();
        });

    </script>
</body>
</html>
