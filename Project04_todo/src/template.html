<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Haven</title>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Todo List</h1>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <h2>Projects</h2>
                <ul id="project-list">
                    </ul>
                <button id="add-project-btn">+ New Project</button>
            </aside>

            <main class="todo-area">
                <div class="todo-header">
                    <h2 id="current-project-title">Default Project</h2>
                    <button id="open-modal-btn">Add Task</button>
                </div>
                <div id="todo-list">
                    </div>
            </main>
        </div>
    </div>

    <dialog id="todo-modal">
        <form id="todo-form" method="dialog">
            <h3>New Task</h3>
            <input type="text" id="todo-title" placeholder="Task Title" required>
            <textarea id="todo-desc" placeholder="Description"></textarea>
            <div class="form-row">
                <input type="date" id="todo-date" required>
                <select id="todo-priority">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
            </div>
            <div class="form-btns">
                <button type="button" id="close-modal">Cancel</button>
                <button type="submit" id="submit-todo">Save Task</button>
            </div>
        </form>
    </dialog>
</body>
</html>
